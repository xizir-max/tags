{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Список тегов</title>
    <link rel="stylesheet" href="{% static 'mainapp/css/style.css' %}">
</head>
<body>
    <div class="container">
        <div class="breadcrumb">
            <a href="/">Главная</a> → Теги
        </div>
        
        <a href="/" class="back">← Назад на главную</a>
        
        <div class="tag-list">
            <h2>Список тегов</h2>
            <div class="tags-section">
                {% for tag in tags %}
                <a href="/tags/{{ tag.id }}/" class="tag">{{ tag.name }}</a>
                {% empty %}
                <div class="no-items">
                    <p>Теги не найдены</p>
                </div>
                {% endfor %}
            </div>
        </div>
    </div>
    
    <script src="{% static 'mainapp/js/main.js' %}"></script>
</body>
</html>
